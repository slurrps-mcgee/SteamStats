<mat-sidenav-container class="h-screen bg-steam-bg">
  <mat-sidenav mode="side" opened class="!bg-steam-card !border-r !border-white/5 !w-64">
    <div class="flex items-center gap-2 px-5 py-5">
      <mat-icon class="!text-steam-primary">sports_esports</mat-icon>
      <span class="text-lg font-bold text-white tracking-tight">SteamStats</span>
    </div>
    <mat-nav-list class="!px-3">
      @for (item of navItems; track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive="!bg-steam-primary/15 !text-steam-primary"
          class="!rounded-lg !mb-1 !text-slate-300"
        >
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="!bg-steam-bg">
    <mat-toolbar class="!bg-transparent !text-white !border-b !border-white/5">
      <span class="font-medium">Steam Companion Dashboard</span>
    </mat-toolbar>
    <main class="p-6 max-w-7xl mx-auto">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
