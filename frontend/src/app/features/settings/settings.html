<div class="flex flex-col gap-6 max-w-lg">
  <div class="rounded-2xl bg-steam-card/80 border border-white/5 shadow-lg p-5">
    <h2 class="text-lg font-semibold text-white mb-2">Active Profile</h2>
    @if (session.hasActiveProfile()) {
      <p class="text-sm text-slate-400 mb-4">
        Currently viewing SteamID <span class="text-steam-primary">{{ session.steamId() }}</span>
      </p>
      <button mat-stroked-button color="warn" (click)="clearSession()">
        <mat-icon class="mr-1">logout</mat-icon>
        Clear profile
      </button>
    } @else {
      <p class="text-sm text-slate-500">No profile is currently active.</p>
    }
  </div>

  <div class="rounded-2xl bg-steam-card/60 border border-dashed border-white/10 p-6 text-sm text-slate-400">
    Steam login, favorites, wishlist, and friends settings are coming in a future update.
  </div>
</div>
